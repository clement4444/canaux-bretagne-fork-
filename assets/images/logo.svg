<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#4a90e2" opacity="0.1" stroke="#4a90e2" stroke-width="2"/>
  
  <!-- Water waves symbolizing canals -->
  <path d="M 50 100 Q 60 90 70 100 T 90 100 T 110 100 T 130 100 T 150 100" 
        stroke="#4a90e2" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 50 120 Q 60 110 70 120 T 90 120 T 110 120 T 130 120 T 150 120" 
        stroke="#4a90e2" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Lock symbol (vertical lines and rectangle) -->
  <rect x="85" y="75" width="30" height="35" fill="none" stroke="#4a90e2" stroke-width="2" rx="3"/>
  <circle cx="100" cy="95" r="4" fill="#4a90e2"/>
  
  <!-- Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#4a90e2">CANAUX</text>
</svg>