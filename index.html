<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi du Trafic Fluvial - Bretagne</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="./assets/styles/main.css">
    <link rel="stylesheet" href="./assets/styles/map.css">
</head>
<body>
    <div class="app-container">
        <!-- Header avec logo et fond noir -->
        <header class="app-header">
            <div class="header-content">
                <img src="./assets/images/logo.png" alt="Logo Canaux Bretagne" class="header-logo">
            </div>
        </header>

        <!-- Section du dropdown -->
        <div class="controls-section">
            <div class="controls-content">
                <select id="channel-select" class="dropdown-menu" aria-label="Sélectionner un canal">
                    <option value="">Chargement...</option>
                </select>
            </div>
        </div>

        <!-- Conteneur de la carte -->
        <main class="map-container" id="map"></main>

        <!-- Modal détails bateaux -->
        <div id="boats-modal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" aria-label="Fermer">✕</button>
                <h2>Détails des bateaux</h2>
                <div id="boats-list" class="boats-list"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Application scripts -->
    <script type="module" src="./assets/scripts/main.js"></script>
</body>
</html>
